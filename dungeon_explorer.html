<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dungeon Crawler</title>
    <style>
        :root {
            --accent: #7a0000;
            --gold: #c5a059;
            --text: #c9b991;
            --glass-bg: rgba(5, 5, 5, 0.58);
            --glass-border: rgba(255, 255, 255, 0.06);
            --panel-bg: rgba(3, 3, 3, 0.72);
            --image-reveal: 32vh;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Georgia", serif;
            color: var(--text);
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* ══ Full-screen background image ══ */
        #scene-visualization {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: #050505;
        }

        #scene-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: none;
            animation: fadeIn 1s ease-in-out;
        }

        #scene-image.loaded { display: block; }

        /* Atmospheric vignette — heavy at bottom for text legibility */
        #scene-visualization::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.08) 0%,
                rgba(0,0,0,0.04) 20%,
                rgba(0,0,0,0.55) 58%,
                rgba(0,0,0,0.96) 100%
            );
            pointer-events: none;
        }

        #scene-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            letter-spacing: 3px;
            color: #333;
            animation: pulse 3s infinite;
            z-index: 1;
        }

        #scene-image.loaded ~ #scene-placeholder { display: none; }

        /* ══ Transparent image spacer ══ */
        #image-spacer {
            flex: 0 0 var(--image-reveal);
            position: relative;
            z-index: 1;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding-bottom: 16px;
        }

        /* Room name floats over the image */
        #room-name-overlay {
            text-align: center;
            font-size: 1.3rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow:
                0 1px 0 rgba(0,0,0,0.9),
                0 2px 24px rgba(0,0,0,0.95),
                0 0 50px rgba(0,0,0,0.6);
            padding: 0 20px;
            animation: fadeIn 0.7s ease-in-out;
        }

        /* ══ Glass narrative panel ══ */
        #narrative-container {
            flex: 1;
            overflow-y: auto;
            position: relative;
            z-index: 1;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            border-radius: 14px 14px 0 0;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        .scene-content {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            padding: 18px 20px 14px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .room-description {
            font-size: 1rem;
            line-height: 1.85;
            color: var(--text);
        }

        .items-found {
            margin-top: 16px;
            padding: 11px 15px;
            background: rgba(197, 160, 89, 0.07);
            border-left: 2px solid var(--gold);
            border-radius: 0 4px 4px 0;
            font-size: 0.92rem;
            line-height: 1.6;
        }

        #action-feedback {
            margin-top: 8px;
            background: rgba(122, 0, 0, 0.14);
            border: 1px solid rgba(122, 0, 0, 0.30);
            border-radius: 6px;
            padding: 9px 12px;
            font-size: 0.82rem;
            line-height: 1.6;
            color: #b8a880;
            font-style: italic;
            display: none;
            max-height: 140px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
            animation: slideIn 0.3s ease-out;
        }

        #action-feedback.visible { display: block; }

        /* ══ Glass action panel ══ */
        #action-panel {
            flex: 0 0 auto;
            position: relative;
            z-index: 2;
            background: var(--panel-bg);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-top: 1px solid var(--glass-border);
            padding: 11px 14px calc(14px + env(safe-area-inset-bottom, 0px));
            display: flex;
            flex-direction: column;
            gap: 9px;
        }

        #action-panel-row1 {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        /* ══ Compass ══ */
        #nav-section { flex: 0 0 auto; }

        .panel-label {
            font-size: 0.54rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.20);
            text-transform: uppercase;
            margin-bottom: 5px;
            text-align: center;
        }

        #nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 40px);
            grid-template-rows: repeat(3, 36px);
            gap: 3px;
        }

        .btn-north  { grid-column: 2; grid-row: 1; }
        .btn-west   { grid-column: 1; grid-row: 2; }
        .btn-east   { grid-column: 3; grid-row: 2; }
        .btn-south  { grid-column: 2; grid-row: 3; }

        .compass-center {
            grid-column: 2;
            grid-row: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(197, 160, 89, 0.22);
            font-size: 0.72rem;
            pointer-events: none;
            user-select: none;
        }

        /* ══ Interaction ══ */
        #interaction-section {
            flex: 1;
            min-width: 0;
        }

        #dynamic-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* ══ Inventory ══ */
        #inventory-section {
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 8px;
        }

        #inventory-list {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 5px;
            max-height: 80px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent) transparent;
        }

        #inventory-empty {
            font-size: 0.80rem;
            color: rgba(255,255,255,0.18);
            font-style: italic;
        }

        .inv-item {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 9px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 4px;
        }

        .inv-item-name {
            font-size: 0.82rem;
            white-space: nowrap;
        }

        .inv-btn {
            padding: 3px 7px;
            font-size: 0.62rem;
            height: 26px;
            min-height: 26px;
        }

        /* ══ Buttons ══ */
        button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.10);
            color: var(--text);
            padding: 0 12px;
            height: 38px;
            min-height: 38px;
            cursor: pointer;
            transition: background 0.12s, border-color 0.12s, color 0.12s, box-shadow 0.12s;
            font-family: inherit;
            text-transform: uppercase;
            font-size: 0.70rem;
            letter-spacing: 1px;
            border-radius: 4px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        #nav-grid button {
            padding: 0;
            width: 40px;
            height: 36px;
            min-height: 36px;
            font-size: 0.80rem;
            font-weight: bold;
        }

        button:hover:not(:disabled),
        button:active:not(:disabled) {
            background: var(--accent);
            border-color: rgba(197, 160, 89, 0.45);
            color: #fff;
            box-shadow: 0 0 14px rgba(122, 0, 0, 0.40);
        }

        button:disabled {
            opacity: 0.10;
            cursor: not-allowed;
        }

        /* Enabled nav buttons have golden tint */
        #nav-grid button:not(:disabled) {
            background: rgba(197, 160, 89, 0.07);
            border-color: rgba(197, 160, 89, 0.22);
            color: var(--gold);
        }

        /* ══ Overlays ══ */
        .full-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            gap: 16px;
            padding: 32px 24px;
        }

        .full-overlay h1 {
            color: var(--gold);
            font-size: 1.9rem;
            letter-spacing: 6px;
            text-align: center;
            margin-bottom: 12px;
        }

        .full-overlay label {
            color: var(--gold);
            font-size: 1rem;
            letter-spacing: 2px;
            text-align: center;
        }

        .lang-btn {
            padding: 0 40px;
            height: 54px;
            font-size: 0.95rem;
            letter-spacing: 3px;
            min-width: 220px;
        }

        #name-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.28);
            color: var(--text);
            padding: 12px 20px;
            font-family: inherit;
            font-size: 1.1rem;
            text-align: center;
            width: 280px;
            max-width: 100%;
            border-radius: 4px;
        }

        #name-input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(197, 160, 89, 0.12);
        }

        .spinner {
            width: 38px;
            height: 38px;
            border: 2px solid rgba(255,255,255,0.05);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        #combine-items {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #combine-items button { padding: 0 24px; height: 46px; }

        /* ══ Animations ══ */
        @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }
        @keyframes pulse   { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.5; } }
        @keyframes spin    { to { transform: rotate(360deg); } }

        /* ══ Desktop ══ */
        @media (min-width: 640px) {
            :root { --image-reveal: 40vh; }
            #room-name-overlay { font-size: 1.75rem; letter-spacing: 6px; }
            .scene-content { padding: 22px 32px 18px; }
            #feedback-box  { padding: 0 32px 22px; }
            #action-panel  { padding: 12px 28px calc(16px + env(safe-area-inset-bottom, 0px)); }
            #nav-grid {
                grid-template-columns: repeat(3, 44px);
                grid-template-rows: repeat(3, 40px);
            }
            #nav-grid button { width: 44px; height: 40px; min-height: 40px; }
            #inventory-list  { max-height: 100px; }
        }

        @media (min-width: 900px) {
            :root { --image-reveal: 45vh; }
            #room-name-overlay { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Full-screen background image -->
    <div id="scene-visualization">
        <img id="scene-image" alt="Scene">
        <div id="scene-placeholder">VISUALIZING SCENE...</div>
    </div>

    <!-- Language selection -->
    <div id="lang-overlay" class="full-overlay">
        <h1>DUNGEON CRAWLER</h1>
        <button class="lang-btn" onclick="startWithLang('en')">ENGLISH</button>
        <button class="lang-btn" onclick="startWithLang('nl')">NEDERLANDS</button>
    </div>

    <!-- Name entry -->
    <div id="name-overlay" class="full-overlay" style="display:none;">
        <label id="name-label">What is your name?</label>
        <input type="text" id="name-input" autofocus>
        <button onclick="submitName()" id="name-btn">START</button>
    </div>

    <!-- Combine overlay -->
    <div id="combine-overlay" class="full-overlay" style="display:none;">
        <p id="combine-prompt" style="color:var(--gold);text-align:center;line-height:1.7;font-size:0.95rem;letter-spacing:0.5px;max-width:340px;"></p>
        <div id="combine-items"></div>
        <button onclick="cancelCombine()" style="margin-top:8px;height:36px;min-height:36px;font-size:0.6rem;padding:0 16px;">CANCEL</button>
    </div>

    <!-- Loading -->
    <div id="loading" class="full-overlay" style="display:none;">
        <div class="spinner"></div>
        <p style="margin-top:22px;letter-spacing:3px;color:#333;font-size:0.58rem;">INITIALIZING DUNGEON...</p>
    </div>

    <!-- Transparent spacer — lets the image breathe -->
    <div id="image-spacer">
        <div id="room-name-overlay"></div>
    </div>

    <!-- Glass narrative panel -->
    <div id="narrative-container">
        <div id="scene-text" class="scene-content"></div>
    </div>

    <!-- Glass action panel -->
    <div id="action-panel">
        <div id="action-panel-row1">
            <div id="nav-section">
                <div class="panel-label" id="nav-label">NAVIGATION</div>
                <div id="nav-grid">
                    <button class="btn-north" id="btn-north" disabled>N</button>
                    <button class="btn-west"  id="btn-west"  disabled>W</button>
                    <div class="compass-center">✦</div>
                    <button class="btn-east"  id="btn-east"  disabled>E</button>
                    <button class="btn-south" id="btn-south" disabled>S</button>
                </div>
            </div>

            <div id="interaction-section">
                <div class="panel-label" id="interaction-label">INTERACTION</div>
                <div id="dynamic-actions"></div>
                <div id="action-feedback"></div>
            </div>
        </div>

        <div id="inventory-section">
            <div class="panel-label" id="backpack-label">BACKPACK</div>
            <div id="inventory-list"><span id="inventory-empty"></span></div>
        </div>
    </div>

    <script>
    // ====== ROOM IMAGE MAPPING ======
    const ROOM_IMAGES = {
        meadow_road:        { locked: "images/weideweg.png" },
        canyon:             { locked: "images/smalle_kloof.png" },
        small_town:         { locked: "images/klein_stadje.png", unlocked: "images/klein_stadje-2.png" },
        enchanted_forest:   { locked: "images/betoverd_bos.png", unlocked: "images/betoverd_bos-2.png" },
        entrance_cave:      { locked: "images/ingang_grot.png", unlocked: "images/ingang_grot-2.png" },
        cave_tunnel:        { locked: "images/grottunnel.png" },
        start_desert:       { locked: "images/woestijn_start.png", unlocked: "images/woestijn_start-2.png" },
        east_desert:        { locked: "images/woestijn_oost.png" },
        north_east_desert:  { locked: "images/woestijn_droom.png" },
        north_desert:       { locked: "images/woestijn_oase.png" },
        south_east_desert:  { locked: "images/woestijn_geraamte.png" },
        south_desert:       { locked: "images/woestijn_karavaan.png" },
        tundra:             { locked: "images/toendra.png" },
        tundra_west:        { locked: "images/toendra_hinderlaag.png" },
        forest:             { locked: "images/bos_gehangene.png" },
        riverland:          { locked: "images/rivier_onbegaanbaar.png", unlocked: "images/rivier_vlot.png" },
        river_to_mountain:  { locked: "images/rivier_bergkant.png" },
        ocean:              { locked: "images/rivier_strand.png" },
        farmland:           { locked: "images/maisvelden.png" },
        mountain:           { locked: "images/mountain.png" },
        start_mountain_pass:{ locked: "images/bergpas_ingang.png", unlocked: "images/bergpas_ingang-2.png" },
        mountain_pass:      { locked: "images/bergpas_gevecht.png" },
        canyon_topside:     { locked: "images/canyon_bovenkant.png" },
        smithy:             { locked: "images/smederij.png" },
        home:               { locked: "images/drakenhol_thuis.png" },
        hilly_country:      { locked: "images/heuvelachtig_land.png" },
    };

    // ====== GAME STATE ======
    let STORY = null;
    let LANG = 'en';
    let DIRECTION_MAP = {};
    let COMMAND_MAP = {};
    let ITEM_NAME_MAP = {};
    let ITEM_DISPLAY_MAP = {};
    let playerName = '';
    let currentRoom = 'meadow_road';
    let inventory = []; // [{name, description, used}]
    let rooms = {};     // ref -> {name, descriptions:{locked,unlocked}, connections:{}, items:[], unlocked:bool}
    let combineCallback = null;

    // ====== LABELS ======
    const LABELS = {
        en: { nav: 'NAVIGATION', interact: 'INTERACTION', backpack: 'BACKPACK', empty: 'Your sack is empty.', take: 'TAKE', use: 'USE', inspect: 'INSPECT', n: 'N', s: 'S', e: 'E', w: 'W', youSee: 'YOU FIND HERE: ', goMsg: dir => 'You go ' + dir + '...', takMsg: name => 'You put the ' + name + ' in your sack.' },
        nl: { nav: 'NAVIGATIE', interact: 'INTERACTIE', backpack: 'RUGZAK', empty: 'Je zak is leeg.', take: 'PAK', use: 'GEBRUIK', inspect: 'BEKIJK', n: 'N', s: 'Z', e: 'O', w: 'W', youSee: 'JE VINDT HIER: ', goMsg: dir => 'Je gaat naar het ' + dir + '...', takMsg: name => 'Je stopt de ' + name + ' in je zak.' }
    };

    function L(key) { return LABELS[LANG][key]; }

    // ====== DIRECTION HELPERS ======
    const CARDINAL = ['north','south','east','west'];
    const CARDINAL_NL = ['noord','zuid','oost','west'];

    function dirButtons() {
        if (LANG === 'nl') {
            return [
                { id: 'btn-north', dir: 'noord', label: 'N' },
                { id: 'btn-south', dir: 'zuid',  label: 'Z' },
                { id: 'btn-east',  dir: 'oost',  label: 'O' },
                { id: 'btn-west',  dir: 'west',  label: 'W' },
            ];
        }
        return [
            { id: 'btn-north', dir: 'north', label: 'N' },
            { id: 'btn-south', dir: 'south', label: 'S' },
            { id: 'btn-east',  dir: 'east',  label: 'E' },
            { id: 'btn-west',  dir: 'west',  label: 'W' },
        ];
    }

    // ====== INIT ======
    async function startWithLang(lang) {
        LANG = lang;
        document.getElementById('lang-overlay').style.display = 'none';
        const file = lang === 'nl' ? 'verhaal.json' : 'story.json';
        const res = await fetch(file);
        STORY = await res.json();
        DIRECTION_MAP = STORY.direction_map || {};
        COMMAND_MAP = STORY.command_map || {};
        ITEM_NAME_MAP = STORY.item_name_map || {};
        ITEM_DISPLAY_MAP = {};
        for (const [display, internal] of Object.entries(ITEM_NAME_MAP)) {
            ITEM_DISPLAY_MAP[internal] = display;
        }
        document.getElementById('name-label').textContent = STORY.messages.name_prompt;
        document.getElementById('name-overlay').style.display = 'flex';
        document.getElementById('name-input').focus();
        document.getElementById('name-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitName();
        });
    }

    function submitName() {
        const name = document.getElementById('name-input').value.trim();
        if (!name) return;
        playerName = name;
        document.getElementById('name-overlay').style.display = 'none';
        document.getElementById('loading').style.display = 'flex';
        const saveKey = 'dungeon_' + LANG + '_' + name.toLowerCase();
        const saved = localStorage.getItem(saveKey);
        if (saved) {
            const state = JSON.parse(saved);
            currentRoom = state.currentRoom;
            inventory = state.inventory;
            rooms = state.rooms;
        } else {
            buildWorld();
        }
        setupLabels();
        updateScene();
        document.getElementById('loading').style.display = 'none';
    }

    function setupLabels() {
        document.getElementById('nav-label').textContent = L('nav');
        document.getElementById('interaction-label').textContent = L('interact');
        document.getElementById('backpack-label').textContent = L('backpack');
        const db = dirButtons();
        for (const b of db) {
            document.getElementById(b.id).textContent = b.label;
        }
    }

    function buildWorld() {
        rooms = {};
        for (const [ref, data] of Object.entries(STORY.rooms)) {
            rooms[ref] = {
                name: data.name,
                descriptions: { locked: data.descriptions.locked, unlocked: data.descriptions.unlocked },
                connections: { ...data.connections },
                items: data.items.map(i => ({ name: i.name, description: i.description, used: false })),
                unlocked: false,
            };
        }
        currentRoom = 'meadow_road';
        inventory = [];
    }

    // ====== DISPLAY NAME HELPERS ======
    function displayName(internalName) {
        return ITEM_DISPLAY_MAP[internalName] || internalName;
    }
    function internalName(itemName) {
        return ITEM_NAME_MAP[itemName] || itemName;
    }

    // ====== UI UPDATE ======
    function updateScene() {
        const room = rooms[currentRoom];
        if (!room) return;

        // Floating room name over image
        document.getElementById('room-name-overlay').textContent = room.name;

        // Scene text (description only — name lives in the image spacer)
        let desc = room.unlocked && room.descriptions.unlocked ? room.descriptions.unlocked : room.descriptions.locked;
        let html = "<div class='room-description'>" + (desc || '').split('\n').join('<br>') + "</div>";
        if (room.items.length > 0) {
            html += "<div class='items-found'><span style='color: var(--gold); font-weight: bold;'>" + L('youSee') + "</span>" + room.items.map(i => i.name).join(', ') + "</div>";
        }
        document.getElementById('scene-text').innerHTML = html;
        setFeedback('');
        document.getElementById('narrative-container').scrollTop = 0;

        // Image
        const imgData = ROOM_IMAGES[currentRoom];
        if (imgData) {
            const src = (room.unlocked && imgData.unlocked) ? imgData.unlocked : imgData.locked;
            updateSceneImage(src);
        } else {
            updateSceneImage(null);
        }

        // Navigation buttons
        const db = dirButtons();
        for (const b of db) {
            const el = document.getElementById(b.id);
            el.disabled = !(b.dir in room.connections);
            el.onclick = () => gameGo(b.dir);
        }

        // Room items (take buttons)
        const container = document.getElementById('dynamic-actions');
        container.innerHTML = '';
        for (const item of room.items) {
            const btn = document.createElement('button');
            btn.textContent = L('take') + ' ' + item.name;
            btn.onclick = () => gameTake(item.name);
            btn.style.borderColor = 'rgba(197,160,89,0.3)';
            container.appendChild(btn);
        }

        updateInventoryUI();
        saveGame();
    }

    function updateInventoryUI() {
        const list = document.getElementById('inventory-list');
        list.innerHTML = '';
        if (inventory.length === 0) {
            const empty = document.createElement('span');
            empty.id = 'inventory-empty';
            empty.textContent = L('empty');
            list.appendChild(empty);
            return;
        }
        for (const item of inventory) {
            const div = document.createElement('div');
            div.className = 'inv-item';

            const nameSpan = document.createElement('span');
            nameSpan.className = 'inv-item-name';
            nameSpan.textContent = item.name;
            div.appendChild(nameSpan);

            const useBtn = document.createElement('button');
            useBtn.className = 'inv-btn';
            useBtn.textContent = L('use');
            useBtn.onclick = () => gameUse(item.name);
            div.appendChild(useBtn);

            const inspBtn = document.createElement('button');
            inspBtn.className = 'inv-btn';
            inspBtn.textContent = L('inspect');
            inspBtn.onclick = () => gameInspect(item.name);
            div.appendChild(inspBtn);

            list.appendChild(div);
        }
    }

    function updateSceneImage(src) {
        const img = document.getElementById('scene-image');
        if (!src) { img.classList.remove('loaded'); return; }
        img.classList.remove('loaded');
        img.onload = () => img.classList.add('loaded');
        img.onerror = () => img.classList.remove('loaded');
        img.src = src;
    }

    function setFeedback(text) {
        const el = document.getElementById('action-feedback');
        if (text) {
            el.innerHTML = text.split('\n').join('<br>');
            el.classList.add('visible');
        } else {
            el.innerHTML = '';
            el.classList.remove('visible');
        }
    }

    // ====== SAVE / LOAD ======
    function saveGame() {
        const saveKey = 'dungeon_' + LANG + '_' + playerName.toLowerCase();
        localStorage.setItem(saveKey, JSON.stringify({ currentRoom, inventory, rooms }));
    }

    // ====== GAME COMMANDS ======
    function gameGo(direction) {
        const room = rooms[currentRoom];
        if (!(direction in room.connections)) {
            setFeedback(STORY.messages.cant_go);
            return;
        }
        if (currentRoom === 'small_town') room.unlocked = true;
        if (currentRoom === 'enchanted_forest') room.unlocked = true;
        if (currentRoom === 'south_east_desert') room.unlocked = true;

        const dest = room.connections[direction];
        if (!rooms[dest]) {
            setFeedback(STORY.messages.room_not_found);
            return;
        }
        setFeedback(L('goMsg')(direction));
        currentRoom = dest;
        updateScene();
    }

    function gameTake(itemName) {
        const room = rooms[currentRoom];
        const idx = room.items.findIndex(i => i.name === itemName);
        if (idx === -1) {
            setFeedback(STORY.messages.item_not_found);
            return;
        }
        const taken = room.items.splice(idx, 1)[0];
        inventory.push(taken);
        let takeMsg = L('takMsg')(itemName);
        if (taken.description) takeMsg += '\n' + taken.description.trim();
        setFeedback(takeMsg);
        updateScene();
    }

    function gameInspect(itemName) {
        const allItems = [...inventory, ...rooms[currentRoom].items];
        const item = allItems.find(i => i.name === itemName);
        if (item) {
            setFeedback(item.description);
        } else {
            setFeedback(STORY.messages.item_not_in_backpack);
        }
    }

    function gameUse(itemName) {
        const item = inventory.find(i => i.name === itemName);
        if (!item) {
            setFeedback(STORY.messages.item_not_owned);
            return;
        }

        const uses = STORY.item_uses[itemName] || {};
        const locRef = currentRoom;
        const internal = internalName(itemName);

        switch (internal) {
            case 'crocodile-teeth':
                setFeedback(uses.default);
                break;

            case 'eagle-egg':
                setFeedback(uses.default);
                inventory = inventory.filter(i => i.name !== itemName);
                updateInventoryUI();
                break;

            case 'feather':
                setFeedback(uses.default);
                break;

            case 'drinking-bag':
                if (locRef === 'small_town') {
                    inventory = inventory.filter(i => i.name !== itemName);
                    const t = uses.transforms_to;
                    inventory.push({ name: t.name, description: t.description, used: false });
                    setFeedback(uses.small_town + '\n' + t.description.trim());
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;

            case 'key':
                if (locRef === 'small_town') {
                    const reveals = uses.reveals_items;
                    const room = rooms[currentRoom];
                    room.items = reveals.map(i => ({ name: i.name, description: i.description, used: false }));
                    inventory = inventory.filter(i => i.name !== itemName);
                    let msg = uses.small_town;
                    msg += room.items.map(i => i.name + (i.description ? ' — ' + i.description.trim() : '')).join('\n');
                    setFeedback(msg);
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;

            case 'torch':
                if (locRef === 'canyon') {
                    const t = uses.transforms_to;
                    item.name = t.name;
                    item.description = t.description;
                    setFeedback(uses.canyon + '\n' + t.description.trim());
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;

            case 'lighted-torch':
                if (locRef === 'entrance_cave') {
                    rooms[currentRoom].unlocked = true;
                    const eastDir = LANG === 'nl' ? 'oost' : 'east';
                    rooms[currentRoom].connections[eastDir] = 'cave_tunnel';
                    setFeedback(uses.entrance_cave);
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;

            case 'full-waterbag':
                if (locRef === 'start_desert') {
                    rooms[currentRoom].unlocked = true;
                    const south = LANG === 'nl' ? 'zuid' : 'south';
                    const east = LANG === 'nl' ? 'oost' : 'east';
                    const north = LANG === 'nl' ? 'noord' : 'north';
                    rooms[currentRoom].connections[south] = 'south_desert';
                    rooms[currentRoom].connections[east] = 'east_desert';
                    rooms[currentRoom].connections[north] = 'north_desert';
                    setFeedback(uses.start_desert);
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;

            case 'driftwood':
            case 'rope':
                if (locRef === 'riverland') {
                    const otherInternal = internal === 'driftwood' ? 'rope' : 'driftwood';
                    const otherDisplay = displayName(otherInternal);
                    showCombinePrompt(uses.riverland, itemName, otherInternal, otherDisplay, uses);
                } else if (locRef === 'ocean') {
                    setFeedback(uses.ocean);
                } else {
                    setFeedback(uses.default);
                }
                break;

            case 'blunt-blades':
                if (locRef === 'smithy') {
                    const t = uses.transforms_to;
                    item.name = t.name;
                    item.description = t.description;
                    setFeedback(uses.smithy + '\n' + t.description.trim());
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;

            case 'horse-armor':
                if (locRef === 'smithy') {
                    const t = uses.transforms_to;
                    item.name = t.name;
                    item.description = t.description;
                    setFeedback(uses.smithy + '\n' + t.description.trim());
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;

            case 'draconian-armor': {
                const talonsName = displayName('huge-talons');
                if (locRef === 'start_mountain_pass') {
                    item.used = true;
                    let msg = uses.start_mountain_pass;
                    const talons = inventory.find(i => i.name === talonsName);
                    if (talons && talons.used) {
                        msg += '\n' + uses.start_mountain_pass_combined;
                        const east = LANG === 'nl' ? 'oost' : 'east';
                        rooms[currentRoom].connections[east] = 'mountain_pass';
                        inventory = inventory.filter(i => i.name !== talonsName && i.name !== itemName);
                        rooms[currentRoom].unlocked = true;
                    } else if (talons) {
                        msg += '\n' + uses.start_mountain_pass_not_combined;
                    }
                    setFeedback(msg);
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;
            }

            case 'huge-talons': {
                const armorName = displayName('draconian-armor');
                if (locRef === 'start_mountain_pass') {
                    item.used = true;
                    let msg = uses.start_mountain_pass;
                    const armor = inventory.find(i => i.name === armorName);
                    if (armor && armor.used) {
                        msg += '\n' + uses.start_mountain_pass_combined;
                        const east = LANG === 'nl' ? 'oost' : 'east';
                        rooms[currentRoom].connections[east] = 'mountain_pass';
                        inventory = inventory.filter(i => i.name !== armorName && i.name !== itemName);
                        rooms[currentRoom].unlocked = true;
                    } else if (armor) {
                        msg += '\n' + uses.start_mountain_pass_not_combined;
                    }
                    setFeedback(msg);
                    updateScene();
                } else {
                    setFeedback(uses.default);
                }
                break;
            }

            default:
                setFeedback(uses.default || STORY.messages.unknown_command);
        }
        saveGame();
    }

    // ====== COMBINE PROMPT ======
    function showCombinePrompt(promptText, sourceItem, otherInternal, otherDisplay, uses) {
        const overlay = document.getElementById('combine-overlay');
        document.getElementById('combine-prompt').textContent = promptText;
        const container = document.getElementById('combine-items');
        container.innerHTML = '';

        for (const item of inventory) {
            if (item.name === sourceItem) continue;
            const btn = document.createElement('button');
            btn.textContent = item.name;
            btn.onclick = () => {
                overlay.style.display = 'none';
                const chosenInternal = internalName(item.name);
                if (chosenInternal === otherInternal && inventory.find(i => i.name === item.name)) {
                    const south = LANG === 'nl' ? 'zuid' : 'south';
                    rooms[currentRoom].connections[south] = 'farmland';
                    rooms[currentRoom].unlocked = true;
                    inventory = inventory.filter(i => i.name !== sourceItem && i.name !== item.name);
                    setFeedback(uses.riverland_success);
                    updateScene();
                } else {
                    setFeedback(uses.riverland_fail);
                }
            };
            container.appendChild(btn);
        }
        overlay.style.display = 'flex';
    }

    function cancelCombine() {
        document.getElementById('combine-overlay').style.display = 'none';
    }
    </script>
</body>
</html>
